<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2026 Full Year Calendar">
    <meta name="author" content="Developer">
    <title>2026 Calendar - Full Year View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #2563eb;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .year-title {
            color: white;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .back-button {
            display: inline-block;
            background: rgba(255, 255, 255, 0.9);
            color: #1d4ed8;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-button:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .month-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .month-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }

        .month-header {
            text-align: center;
            margin-bottom: 15px;
            color: #1d4ed8;
            font-size: 1.4rem;
            font-weight: bold;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #6b7280;
            font-size: 0.8rem;
            padding: 8px 4px;
            background: #f3f4f6;
            border-radius: 4px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .day {
            text-align: center;
            padding: 8px 4px;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day:hover {
            background: #dbeafe;
            transform: scale(1.1);
        }

        .day.other-month {
            color: #d1d5db;
            background: #f9fafb;
        }

        .day.current-day {
            background: #1d4ed8;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.4);
        }

        .day.today {
            background: #ef4444;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .year-title {
                font-size: 2rem;
            }

            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .month-container {
                padding: 15px;
            }

            .month-header {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 1200px) {
            .calendar-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 768px) and (max-width: 1199px) {
            .calendar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="year-title">2026</h1>
        <a href="index.html" class="back-button">← Back to Home</a>
    </div>

    <div class="calendar-grid" id="calendar-grid">
        <!-- 12个月的容器将由JavaScript动态生成 -->
    </div>

    <script>
        // 月份名称
        const monthNames = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        // 星期名称
        const weekdayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        // 获取当前日期
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentDate = today.getDate();

        // 获取指定月份的天数
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        // 获取指定月份第一天是星期几
        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        // 生成单个月的日历
        function generateMonthCalendar(year, month) {
            const monthContainer = document.createElement('div');
            monthContainer.className = 'month-container';
            monthContainer.setAttribute('data-month', month);

            // 月份标题
            const monthHeader = document.createElement('div');
            monthHeader.className = 'month-header';
            monthHeader.textContent = monthNames[month];
            monthContainer.appendChild(monthHeader);

            // 星期标题
            const weekdaysContainer = document.createElement('div');
            weekdaysContainer.className = 'weekdays';
            weekdayNames.forEach(day => {
                const weekdayElement = document.createElement('div');
                weekdayElement.className = 'weekday';
                weekdayElement.textContent = day;
                weekdaysContainer.appendChild(weekdayElement);
            });
            monthContainer.appendChild(weekdaysContainer);

            // 日期网格
            const daysGrid = document.createElement('div');
            daysGrid.className = 'days-grid';

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const daysInPrevMonth = getDaysInMonth(year, month - 1);

            // 添加上个月的尾部日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day other-month';
                dayElement.textContent = daysInPrevMonth - i;
                daysGrid.appendChild(dayElement);
            }

            // 添加当前月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day';
                dayElement.textContent = day;

                // 高亮当前日期（如果是当前年月）
                if (year === currentYear && month === currentMonth && day === currentDate) {
                    dayElement.classList.add('today');
                } else if (year === 2026 && month === currentMonth && day === currentDate && currentYear === 2026) {
                    dayElement.classList.add('current-day');
                }

                daysGrid.appendChild(dayElement);
            }

            // 添加下个月的开头日期，填满6行
            const totalCells = daysGrid.children.length;
            const remainingCells = 42 - totalCells; // 6行 × 7列 = 42个格子
            for (let day = 1; day <= remainingCells; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day other-month';
                dayElement.textContent = day;
                daysGrid.appendChild(dayElement);
            }

            monthContainer.appendChild(daysGrid);
            return monthContainer;
        }

        // 生成整年日历
        function generateYearCalendar(year) {
            const calendarGrid = document.getElementById('calendar-grid');
            
            // 清空现有内容
            calendarGrid.innerHTML = '';

            // 生成12个月的日历
            for (let month = 0; month < 12; month++) {
                const monthCalendar = generateMonthCalendar(year, month);
                calendarGrid.appendChild(monthCalendar);
            }
        }

        // 页面加载完成后生成日历
        document.addEventListener('DOMContentLoaded', function() {
            try {
                generateYearCalendar(2026);
                console.log('2026年日历生成完成');
            } catch (error) {
                console.error('生成日历时出错:', error);
                // 错误处理：显示错误信息
                const calendarGrid = document.getElementById('calendar-grid');
                calendarGrid.innerHTML = '<div style="text-align: center; color: white; font-size: 1.2rem;">日历加载失败，请刷新页面重试</div>';
            }
        });

        // 添加日期点击事件
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('day') && !e.target.classList.contains('other-month')) {
                // 移除之前的选中状态
                document.querySelectorAll('.day.selected').forEach(day => {
                    day.classList.remove('selected');
                });
                
                // 添加选中状态
                e.target.classList.add('selected');
                
                // 可以在这里添加更多交互逻辑
                const monthContainer = e.target.closest('.month-container');
                const monthIndex = parseInt(monthContainer.getAttribute('data-month'));
                const day = e.target.textContent;
                console.log(`选中日期: 2026年${monthIndex + 1}月${day}日`);
            }
        });
    </script>
</body>
</html>
