<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2026 Full Year Calendar">
    <meta name="author" content="Developer">
    <title>2026年日历 - Full Year Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #2563eb;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .year-title {
            color: white;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .back-button {
            display: inline-block;
            background: rgba(255, 255, 255, 0.9);
            color: #1d4ed8;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .month-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .month-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }

        .month-header {
            text-align: center;
            margin-bottom: 15px;
            color: #1d4ed8;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #6b7280;
            font-size: 0.8rem;
            padding: 5px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .day:hover {
            background: #e0e7ff;
        }

        .day.other-month {
            color: #d1d5db;
        }

        .day.today {
            background: #1d4ed8;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.3);
        }

        .day.weekend {
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .year-title {
                font-size: 2rem;
            }
            
            .month-container {
                padding: 15px;
            }
            
            .day {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="year-title">2026年日历</h1>
        <a href="index.html" class="back-button">← 返回首页</a>
    </div>

    <div class="calendar-grid" id="calendar-grid">
        <!-- 12个月的日历将通过JavaScript生成 -->
    </div>

    <script>
        // 月份名称
        const monthNames = [
            '一月', '二月', '三月', '四月', '五月', '六月',
            '七月', '八月', '九月', '十月', '十一月', '十二月'
        ];

        // 星期名称
        const weekdayNames = ['日', '一', '二', '三', '四', '五', '六'];

        // 获取当前日期
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentDate = today.getDate();

        // 获取某月的天数
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        // 获取某月第一天是星期几
        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        // 生成单个月的日历
        function generateMonthCalendar(year, month) {
            const monthContainer = document.createElement('div');
            monthContainer.className = 'month-container';

            // 月份标题
            const monthHeader = document.createElement('div');
            monthHeader.className = 'month-header';
            monthHeader.textContent = `${monthNames[month]} ${year}`;
            monthContainer.appendChild(monthHeader);

            // 星期标题
            const weekdaysContainer = document.createElement('div');
            weekdaysContainer.className = 'weekdays';
            weekdayNames.forEach(day => {
                const weekdayElement = document.createElement('div');
                weekdayElement.className = 'weekday';
                weekdayElement.textContent = day;
                weekdaysContainer.appendChild(weekdayElement);
            });
            monthContainer.appendChild(weekdaysContainer);

            // 日期网格
            const daysGrid = document.createElement('div');
            daysGrid.className = 'days-grid';

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const daysInPrevMonth = getDaysInMonth(year, month - 1);

            // 填充上个月的日期
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day other-month';
                dayElement.textContent = daysInPrevMonth - i;
                daysGrid.appendChild(dayElement);
            }

            // 填充当前月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day';
                dayElement.textContent = day;

                // 标记周末
                const dayOfWeek = (firstDay + day - 1) % 7;
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    dayElement.classList.add('weekend');
                }

                // 标记今天
                if (year === currentYear && month === currentMonth && day === currentDate) {
                    dayElement.classList.add('today');
                }

                daysGrid.appendChild(dayElement);
            }

            // 填充下个月的日期
            const totalCells = daysGrid.children.length;
            const remainingCells = 42 - totalCells; // 6行 x 7列 = 42个格子
            for (let day = 1; day <= remainingCells; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day other-month';
                dayElement.textContent = day;
                daysGrid.appendChild(dayElement);
            }

            monthContainer.appendChild(daysGrid);
            return monthContainer;
        }

        // 生成整年日历
        function generateYearCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            
            for (let month = 0; month < 12; month++) {
                const monthCalendar = generateMonthCalendar(2026, month);
                calendarGrid.appendChild(monthCalendar);
            }
        }

        // 页面加载完成后生成日历
        document.addEventListener('DOMContentLoaded', function() {
            generateYearCalendar();
        });
    </script>
</body>
</html>
