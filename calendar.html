<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: #1d4ed8;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .back-button:active {
            transform: translateY(0);
        }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .year-btn {
            background: #1d4ed8;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .year-btn:hover {
            background: #1e40af;
            transform: scale(1.1);
        }

        .year-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1d4ed8;
            min-width: 80px;
            text-align: center;
        }

        .calendar-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .month-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .month-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .month-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .month-card:hover::before {
            left: 100%;
        }

        .month-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .month-number {
            font-size: 2rem;
            font-weight: 300;
            opacity: 0.8;
        }

        .calendar-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #1d4ed8;
            margin-bottom: 10px;
        }

        .calendar-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .year-selector {
                justify-content: center;
            }

            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .calendar-container {
                padding: 20px;
                margin: 0 10px;
            }

            .calendar-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .calendar-grid {
                grid-template-columns: 1fr;
            }

            .month-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-button" id="backButton">
            <span>←</span>
            <span>Back to Home</span>
        </button>
        
        <div class="year-selector">
            <button class="year-btn" id="prevYear">−</button>
            <div class="year-display" id="yearDisplay">2024</div>
            <button class="year-btn" id="nextYear">+</button>
        </div>
    </div>

    <div class="calendar-container">
        <h1 class="calendar-title" id="calendarTitle">Calendar 2024</h1>
        <p class="calendar-subtitle">Click on any month to view details</p>
        
        <div class="calendar-grid" id="calendarGrid">
            <!-- Months will be generated by JavaScript -->
        </div>
    </div>

    <script>
        class CalendarController {
            constructor() {
                this.currentYear = new Date().getFullYear();
                this.months = [
                    'January', 'February', 'March', 'April',
                    'May', 'June', 'July', 'August',
                    'September', 'October', 'November', 'December'
                ];
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.renderCalendar();
                this.updateYearDisplay();
            }

            setupEventListeners() {
                // Back button navigation
                document.getElementById('backButton').addEventListener('click', () => {
                    this.navigateToHome();
                });

                // Year navigation
                document.getElementById('prevYear').addEventListener('click', () => {
                    this.changeYear(-1);
                });

                document.getElementById('nextYear').addEventListener('click', () => {
                    this.changeYear(1);
                });

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.navigateToHome();
                    } else if (e.key === 'ArrowLeft') {
                        this.changeYear(-1);
                    } else if (e.key === 'ArrowRight') {
                        this.changeYear(1);
                    }
                });
            }

            navigateToHome() {
                // Check if index.html exists in the same directory
                if (window.location.pathname.includes('calendar.html')) {
                    window.location.href = 'index.html';
                } else {
                    // Fallback: go back in history
                    window.history.back();
                }
            }

            changeYear(delta) {
                this.currentYear += delta;
                this.updateYearDisplay();
                this.renderCalendar();
                
                // Add visual feedback
                const yearDisplay = document.getElementById('yearDisplay');
                yearDisplay.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    yearDisplay.style.transform = 'scale(1)';
                }, 200);
            }

            updateYearDisplay() {
                document.getElementById('yearDisplay').textContent = this.currentYear;
                document.getElementById('calendarTitle').textContent = `Calendar ${this.currentYear}`;
            }

            renderCalendar() {
                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';

                this.months.forEach((month, index) => {
                    const monthCard = this.createMonthCard(month, index + 1);
                    grid.appendChild(monthCard);
                });
            }

            createMonthCard(monthName, monthNumber) {
                const card = document.createElement('div');
                card.className = 'month-card';
                card.innerHTML = `
                    <div class="month-name">${monthName}</div>
                    <div class="month-number">${monthNumber.toString().padStart(2, '0')}</div>
                `;

                // Add click handler for month selection
                card.addEventListener('click', () => {
                    this.selectMonth(monthName, monthNumber);
                });

                return card;
            }

            selectMonth(monthName, monthNumber) {
                // Add visual feedback
                const cards = document.querySelectorAll('.month-card');
                cards.forEach(card => card.style.transform = 'scale(0.95)');
                
                setTimeout(() => {
                    cards.forEach(card => card.style.transform = '');
                }, 150);

                // Show month selection feedback
                this.showMonthSelection(monthName, monthNumber);
            }

            showMonthSelection(monthName, monthNumber) {
                // Create temporary notification
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(29, 78, 216, 0.95);
                    color: white;
                    padding: 20px 30px;
                    border-radius: 15px;
                    font-size: 1.2rem;
                    font-weight: bold;
                    z-index: 10000;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                    backdrop-filter: blur(10px);
                    opacity: 0;
                    transition: opacity 0.3s ease;
                `;
                notification.textContent = `Selected: ${monthName} ${this.currentYear}`;
                
                document.body.appendChild(notification);
                
                // Animate in
                setTimeout(() => {
                    notification.style.opacity = '1';
                }, 10);
                
                // Remove after delay
                setTimeout(() => {
                    notification.style.opacity = '0';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                }, 2000);
            }
        }

        // Initialize calendar when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new CalendarController();
        });

        // Add smooth transitions
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                .year-display {
                    transition: transform 0.2s ease;
                }
                .month-card {
                    transition: transform 0.3s ease, box-shadow 0.3s ease;
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
