<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Full Year Calendar View">
    <meta name="author" content="Developer">
    <title>Calendar - Full Year View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #1d4ed8;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #1d4ed8;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 78, 216, 0.4);
        }

        .year-title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(29, 78, 216, 0.3);
        }

        .year-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .year-nav-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #1d4ed8;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .year-nav-btn:hover {
            background: #1d4ed8;
            color: white;
            transform: translateY(-2px);
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .month-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .month-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .month-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .month-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1d4ed8;
            margin-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #e2e8f0;
            border-radius: 8px;
            padding: 1px;
        }

        .day-header {
            background: #1d4ed8;
            color: white;
            padding: 8px 4px;
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .day-header:first-child {
            border-top-left-radius: 7px;
        }

        .day-header:last-child {
            border-top-right-radius: 7px;
        }

        .calendar-day {
            background: white;
            padding: 8px 4px;
            text-align: center;
            font-size: 0.85rem;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-day:hover {
            background: #f1f5f9;
            color: #1d4ed8;
            font-weight: bold;
        }

        .calendar-day.other-month {
            color: #cbd5e1;
            background: #f8fafc;
        }

        .calendar-day.today {
            background: #1d4ed8;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        .calendar-day.selected {
            background: #3730a3;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        .stats-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1d4ed8;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1d4ed8;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .months-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .year-title {
                font-size: 2rem;
            }
            
            .back-button {
                position: static;
                margin-bottom: 20px;
            }
            
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Home</a>
    
    <div class="header">
        <div class="year-nav">
            <button class="year-nav-btn" onclick="changeYear(-1)">‹</button>
            <h1 class="year-title" id="yearTitle">2024</h1>
            <button class="year-nav-btn" onclick="changeYear(1)">›</button>
        </div>
    </div>

    <div class="months-grid" id="monthsGrid">
        <!-- Months will be generated by JavaScript -->
    </div>

    <div class="stats-container">
        <h2 class="stats-title">Year Statistics</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-number" id="totalDays">365</span>
                <span class="stat-label">Total Days</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="weekdays">261</span>
                <span class="stat-label">Weekdays</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="weekends">104</span>
                <span class="stat-label">Weekend Days</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="daysLeft">0</span>
                <span class="stat-label">Days Remaining</span>
            </div>
        </div>
    </div>

    <script>
        let currentYear = new Date().getFullYear();
        const today = new Date();
        
        const monthNames = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        function generateCalendar() {
            const monthsGrid = document.getElementById('monthsGrid');
            const yearTitle = document.getElementById('yearTitle');
            
            yearTitle.textContent = currentYear;
            monthsGrid.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const monthContainer = document.createElement('div');
                monthContainer.className = 'month-container';
                
                const monthHeader = document.createElement('div');
                monthHeader.className = 'month-header';
                
                const monthTitle = document.createElement('h3');
                monthTitle.className = 'month-title';
                monthTitle.textContent = monthNames[month];
                
                monthHeader.appendChild(monthTitle);
                monthContainer.appendChild(monthHeader);
                
                const calendarGrid = document.createElement('div');
                calendarGrid.className = 'calendar-grid';
                
                // Add day headers
                dayNames.forEach(day => {
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'day-header';
                    dayHeader.textContent = day;
                    calendarGrid.appendChild(dayHeader);
                });
                
                const daysInMonth = getDaysInMonth(currentYear, month);
                const firstDay = getFirstDayOfMonth(currentYear, month);
                const daysInPrevMonth = getDaysInMonth(currentYear, month - 1);
                
                // Add previous month's trailing days
                for (let i = firstDay - 1; i >= 0; i--) {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'calendar-day other-month';
                    dayElement.textContent = daysInPrevMonth - i;
                    calendarGrid.appendChild(dayElement);
                }
                
                // Add current month's days
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'calendar-day';
                    dayElement.textContent = day;
                    
                    // Check if it's today
                    if (currentYear === today.getFullYear() && 
                        month === today.getMonth() && 
                        day === today.getDate()) {
                        dayElement.classList.add('today');
                    }
                    
                    // Add click event
                    dayElement.addEventListener('click', function() {
                        // Remove previous selection
                        document.querySelectorAll('.calendar-day.selected').forEach(el => {
                            el.classList.remove('selected');
                        });
                        
                        // Add selection to clicked day (if not today)
                        if (!this.classList.contains('today')) {
                            this.classList.add('selected');
                        }
                        
                        // You can add more functionality here, like showing events for the selected date
                        console.log(`Selected date: ${monthNames[month]} ${day}, ${currentYear}`);
                    });
                    
                    calendarGrid.appendChild(dayElement);
                }
                
                // Add next month's leading days
                const totalCells = calendarGrid.children.length - 7; // Subtract day headers
                const remainingCells = 42 - totalCells; // 6 rows * 7 days = 42 total cells
                
                for (let day = 1; day <= remainingCells; day++) {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'calendar-day other-month';
                    dayElement.textContent = day;
                    calendarGrid.appendChild(dayElement);
                }
                
                monthContainer.appendChild(calendarGrid);
                monthsGrid.appendChild(monthContainer);
            }
            
            updateStatistics();
        }

        function changeYear(direction) {
            currentYear += direction;
            generateCalendar();
        }

        function updateStatistics() {
            const totalDaysElement = document.getElementById('totalDays');
            const weekdaysElement = document.getElementById('weekdays');
            const weekendsElement = document.getElementById('weekends');
            const daysLeftElement = document.getElementById('daysLeft');
            
            const isLeap = isLeapYear(currentYear);
            const totalDays = isLeap ? 366 : 365;
            
            // Calculate weekdays and weekends
            let weekdays = 0;
            let weekends = 0;
            
            for (let month = 0; month < 12; month++) {
                const daysInMonth = getDaysInMonth(currentYear, month);
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(currentYear, month, day);
                    const dayOfWeek = date.getDay();
                    
                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        weekends++;
                    } else {
                        weekdays++;
                    }
                }
            }
            
            // Calculate days remaining in current year
            let daysLeft = 0;
            if (currentYear === today.getFullYear()) {
                const endOfYear = new Date(currentYear, 11, 31);
                const timeDiff = endOfYear.getTime() - today.getTime();
                daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));
            } else if (currentYear > today.getFullYear()) {
                daysLeft = totalDays;
            }
            
            totalDaysElement.textContent = totalDays;
            weekdaysElement.textContent = weekdays;
            weekendsElement.textContent = weekends;
            daysLeftElement.textContent = Math.max(0, daysLeft);
        }

        // Initialize calendar on page load
        document.addEventListener('DOMContentLoaded', function() {
            generateCalendar();
        });

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                changeYear(-1);
            } else if (e.key === 'ArrowRight') {
                changeYear(1);
            }
        });
    </script>
</body>
</html>
