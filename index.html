<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple Hello World page">
    <meta name="author" content="Developer">
    <title>Hello World - Welcome Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #2563eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 20px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hello-world {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite alternate;
            text-shadow: 0 2px 4px rgba(29, 78, 216, 0.3);
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4b5563;
            margin-bottom: 30px;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(75, 85, 99, 0.1);
        }

        .welcome-text {
            font-size: 1rem;
            color: #6b7280;
            line-height: 1.8;
            margin-bottom: 30px;
            text-shadow: 0 1px 2px rgba(107, 114, 128, 0.1);
        }

        .visitor-counter {
            font-size: 1rem;
            color: #4b5563;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(29, 78, 216, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(29, 78, 216, 0.2);
        }

        .visitor-counter .count {
            font-weight: bold;
            color: #1d4ed8;
            font-size: 1.2rem;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.4);
        }

        @media (max-width: 768px) {
            .hello-world {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 40px 30px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="hello-world">Hello World!</h1>
        <p class="subtitle">Welcome to our amazing website</p>
        <p class="welcome-text">
            This is a simple Hello World page with beautiful styling and animations. 
            We're glad you're here! Explore and enjoy your stay.
        </p>
        
        <div class="visitor-counter">
            <span>You are visitor number: </span>
            <span class="count" id="visitorCount">Loading...</span>
        </div>
        
        <a href="#" class="cta-button">Get Started</a>
    </div>

    <script>
        // 访问计数功能
        function updateVisitorCount() {
            // 从localStorage获取访问次数
            let count = localStorage.getItem('visitorCount');
            
            if (count === null) {
                count = 1;
            } else {
                count = parseInt(count) + 1;
            }
            
            // 保存新的访问次数
            localStorage.setItem('visitorCount', count);
            
            // 显示访问次数
            document.getElementById('visitorCount').textContent = count;
        }

        // 页面加载时更新访问计数
        window.addEventListener('load', updateVisitorCount);
    </script>
</body>
</html>
