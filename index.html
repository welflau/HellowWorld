<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple Hello World page">
    <meta name="author" content="Developer">
    <title>Hello World - Welcome Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #2563eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 20px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hello-world {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite alternate;
            text-shadow: 0 2px 4px rgba(29, 78, 216, 0.3);
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4b5563;
            margin-bottom: 30px;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(75, 85, 99, 0.1);
        }

        .welcome-text {
            font-size: 1rem;
            color: #6b7280;
            line-height: 1.8;
            margin-bottom: 30px;
            text-shadow: 0 1px 2px rgba(107, 114, 128, 0.1);
        }

        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 78, 216, 0.4);
        }

        .input-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(107, 114, 128, 0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .input-field {
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .input-field:focus {
            outline: none;
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
            background: rgba(255, 255, 255, 1);
        }

        .input-button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #1d4ed8, #3730a3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
        }

        .input-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.4);
        }

        @media (max-width: 768px) {
            .input-group {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="hello-world">Hello World!</h1>
        <p class="subtitle">Welcome to our amazing web experience</p>
        <p class="welcome-text">
            This is a beautifully designed Hello World page that demonstrates modern web development techniques. 
            Experience the perfect blend of aesthetics and functionality.
        </p>
        <a href="#" class="cta-button">Get Started</a>
        
        <div class="input-section">
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Enter your name">
                <input type="email" class="input-field" placeholder="Enter your email">
                <button class="input-button">Submit</button>
            </div>
        </div>
    </div>
</body>
</html>
